# Paper training (Sec.): 152K steps, global batch 192 (=24/GPU × 8 GPUs), 3K LR warmup to 4e-4,
# cosine LR to 0, grad clip 1.0, skip optimizer step if ||g||>5 before clip; curriculum linear over 86K steps (CLI --curriculum-ramp-steps).
training:
  # Pre-clip ||g|| skip (paper: 5.0). null = off (still clip to grad_clip_norm). Large batch often needs null or higher threshold.
  allowed_gradnorm_factor: null
  num_sanity_val_steps: 2
  skip_heavy_gaussian_export: true
  gs_supervise_target_views_only: true
  amp_dtype: bf16
  batch_size_per_gpu: 24
  camera_center_reg_weight: 0.0
  checkpoint_every: 2000
  force_resume_ckpt: false
  grad_accum_steps: 1
  grad_checkpoint_every: 1
  grad_clip_norm: 1.0
  l2_loss_weight: 1.0
  warmup: 3000
  # LinearLR initial multiplier vs peak LR (default 1e-4: avoids 1e-8 which plots as ~4e-12 and looks “broken”).
  lr_warmup_start_factor: 1.0e-4
  # constant | cosine — paper uses cosine to 0 after warmup (override with lr_schedule: constant for ablations).
  lr_schedule: cosine
  lr_cosine_t_max_steps: null
  lr_cosine_min_ratio: 0.0
  # Stop when successful optimizer steps reach this (null or --max-effective-updates 0 = only CLI --max-steps).
  max_effective_updates: 152000
  # Floor for Trainer.max_steps when max_effective_updates is set: max(cli, cap + slack) so skips do not end train early.
  max_global_step_slack: 1000000
  max_fwdbwd_passes: 152000
  max_resample_tries: 200
  no_pass_steps: 200
  normalize_distance_to: 2.0
  num_epochs: 1000000
  num_threads: 8
  num_workers: 4
  perceptual_loss_weight: 0.2
  pose_consistency_reg_weight: 0.0
  prefetch_factor: 8
  print_every: 20
  reset_lr: false
  reset_training_state: false
  reset_weight_decay: false
  resume_ckpt: none
  reproj_use_input_target_split: true
  reproj_loss_weight: 1.0
  reproj_smooth_weight: 0.0
  reproj_pair_mode: input_target_all
  reproj_min_depth: 0.01
  reproj_max_depth: 1000.0
  reproj_use_gt_intrinsics: false
  reproj_use_gt_pose: false
  single_scene_overfit: false
  torch_compile: false
  use_amp: true
  use_gt_intrinsics: false
  use_rel_pose: true
  use_tf32: true
  vis_every: 500
  use_wandb: true
  wandb_project: E-RayZer
  wandb_exp_name: rayzerpp-vggt-gs-dl3dv-filtered-bs-192-10view-5-5-middle-covis-single-86000-iter-min-1.0-1.0-max-1.0-0.5-resample
  wandb_log_every: 50
  wandb_offline: false
